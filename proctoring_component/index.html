<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
      body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; }
      video { width: 100%; height: auto; border-radius: 12px; transform: scaleX(-1); object-fit: cover;}
      #warning-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(239, 68, 68, 0.4); border: 4px solid #ef4444; box-sizing: border-box;
        display: none; align-items: center; justify-content: center; text-align: center;
        color: white; font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        border-radius: 12px; z-index: 10;
        animation: pulse 1s infinite alternate;
      }
      @keyframes pulse {
        0% { background: rgba(239, 68, 68, 0.3); }
        100% { background: rgba(239, 68, 68, 0.6); }
      }
      .container { position: relative; width: 100%; aspect-ratio: 4/3; }
      #loading {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: rgba(255,255,255,0.7); font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="container" id="container">
      <div id="loading">Initializing Camera...</div>
      <video id="video" autoplay playsinline></video>
      <div id="warning-overlay">WARNING<br><span style="font-size:14px; font-weight:500;">Please look at the camera</span></div>
    </div>
    <script>
      function sendMessageToStreamlitClient(type, data) {
        var outData = Object.assign({
            isStreamlitMessage: true,
            type: type,
        }, data);
        window.parent.postMessage(outData, "*");
      }

      function init() {
        sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
      }
      
      function setFrameHeight() {
        sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: document.getElementById('container').clientHeight});
      }

      window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
            setFrameHeight();
        }
      });

      const videoElement = document.getElementById('video');
      const warningOverlay = document.getElementById('warning-overlay');
      const loading = document.getElementById('loading');
      
      let warningCount = 0;
      let isLookingAway = false;
      let lastReportedCount = 0;
      let modelLoaded = false;

      function reportWarning() {
          if (warningCount !== lastReportedCount) {
             sendMessageToStreamlitClient("streamlit:setComponentValue", {value: warningCount});
             lastReportedCount = warningCount;
          }
      }

      const faceMesh = new FaceMesh({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
      }});
      
      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      let lookAwayFrames = 0;
      const LOOK_AWAY_THRESHOLD = 25; // frames to wait before warning

      faceMesh.onResults((results) => {
        if (!modelLoaded) {
            modelLoaded = true;
            loading.style.display = 'none';
        }
        
        let away = false;
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
          away = true;
        } else {
          const landmarks = results.multiFaceLandmarks[0];
          const nose = landmarks[1];
          const leftEye = landmarks[33];
          const rightEye = landmarks[263];
          
          const eyeDist = rightEye.x - leftEye.x;
          const noseDistLeft = nose.x - leftEye.x;
          const ratio = noseDistLeft / eyeDist;
          
          if (ratio < 0.25 || ratio > 0.75) {
             away = true; // Looking too far left or right
          }
        }

        if (away) {
            lookAwayFrames++;
            if (lookAwayFrames > LOOK_AWAY_THRESHOLD && !isLookingAway) {
                isLookingAway = true;
                warningOverlay.style.display = 'flex';
                warningCount++;
                reportWarning();
            }
        } else {
            lookAwayFrames = 0;
            if (isLookingAway) {
                isLookingAway = false;
                warningOverlay.style.display = 'none';
            }
        }
      });

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await faceMesh.send({image: videoElement});
        },
        width: 640,
        height: 480
      });
      camera.start().then(() => {
          setFrameHeight();
      });
      
      init();
    </script>
  </body>
</html>
